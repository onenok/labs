
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.N.G.</title>
    <link rel="icon" type="image/ico" href="./img/JANG.png">
    <link rel="stylesheet" type="text/css" href="./default_style.css">
    <link rel="stylesheet" type="text/css" href="./form_default.css" data-scope=".usingFormDefaultStyle">
    <script src="./nav.js" defer></script>
    <script src="./goodFunc.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/validator@13.15.23/validator.min.js" defer></script>
    <script src="./particlebg.js" defer></script>
    <style>
        .input-name-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
            height: 100%;
        }

        .input-name-page h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="major-container">
        <!--nav bar-->
        <nav class="top-bar">
            <a href="./" class="nav-logo">
                <span>J.A.N.G.</span>
            </a>
        </nav>
        <!--content-->
        <div class="container">
            <div id="particles-js"></div>
            <div class="main-content" id="main-content">
                <div class="input-name-page usingFormDefaultStyle">
                    <div class="form-container">
                        <h1>Enter Your Name Pls</h1>
                        <form id="input-name-form" action="{{url_for('index')}}" method="post">
                            <div class="form-input-group">
                                <label for="user_name" class="form-label">Username:</label>
                                <input type="text" id="user_name" name="user_name" placeholder="Enter your username" class="form-input"
                                    autocomplete="on" required><br><br>
                            </div>
                            <input type="submit" value="Start Game!" class="form-submit-button">
                        </form>
                    </div>
                </div>
            </div>
            <footer class="footer">
                <p>&copy; 2026 Just-A-Number-Game all rights reserved.</p>
            </footer>
        </div>
    </div>
</body>
</html>
